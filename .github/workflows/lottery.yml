name: Lottery

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python main.py
      - name: Generate sha256 list (exclude .git)
        run: |
          find . -type f \
            -not -path './.git' \
            -not -path './.git/*' \
            -print0 \
          | sort -z \
          | xargs -0 sha256sum > sha256sum_list.txt
      - name: Prepare release tag
        id: release_tag
        run: echo "tag=sha256sum-${GITHUB_RUN_NUMBER}" >> "${GITHUB_OUTPUT}"
      - name: Upload sha256 list to Release Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: SHA256 List ${{ steps.release_tag.outputs.tag }}
          files: sha256sum_list.txt
