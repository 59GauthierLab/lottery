name: Lottery

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python main.py
      - name: Generate sha256 list (exclude .git)
        run: |
          find . -type f \
            -not -path './.git' \
            -not -path './.git/*' \
            -print0 \
          | sort -z \
          | xargs -0 sha256sum > sha256sum_list.txt
      - name: Upload sha256 list
        uses: actions/upload-artifact@v4
        with:
          name: sha256sum-list
          path: sha256sum_list.txt
