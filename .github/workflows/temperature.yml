name: Temperature Check

on:
  # 毎日 09:00 JST（00:00 UTC）に定期実行する．
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run mock temperature check
        run: python temperature.py
